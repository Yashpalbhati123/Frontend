<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #box {
        padding: 20px;
        margin: 20px;
        background-color: aqua;
        border: 2px solid black;
        height: 200px;
        width: 200px;
        box-sizing: border-box;
      }
      #para {
        padding: 20px;
        margin: 25px;
        height: 200px;
        width: 200px;
      }
      #anchor {
        padding: 30px;
        margin: 30px;
        height: 1px;
        width: 1px;
      }
      #button {
        padding: 25px;
        margin: 24px;
        height: 201px;
        width: 201px;
        box-sizing: content-box;
      }
      #image {
        padding: 30px;
        margin: 15px;
        height: 205px;
        width: 205px;
      }
    </style>
  </head>
  <body>
    <h1 id="box">Box Model</h1>
    <p id="para">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Nulla ea
      laudantium maxime enim, omnis placeat ipsam. Reiciendis voluptates tempore
      iste.
    </p>
    <a id="anchor" href="">Forgot Password?</a>
    <button id="button">Submit</button>
    <img
      id="image"
      src="6d08add4e1ff0f0155d84c990839d2578e5bc3bb.png"
      alt="this is an img"
    />
  </body>
</html>
